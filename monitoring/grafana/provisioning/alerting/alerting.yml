apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: # discord webhook url
          message: |
            🚨 **서버 다운 감지**
            ilgijjan-prod 서버가 응답하지 않습니다.

policies:
  - orgId: 1
    receiver: discord

groups:
  - orgId: 1
    name: server-down
    folder: ilgijjan
    interval: 1m
    rules:
      - uid: server-down-alert
        title: "서버 다운"
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: up{job="ilgijjan-server"}
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  query:
                    params: [A]
        for: 1m
        annotations:
          summary: "ilgijjan-prod 서버 다운"
        labels: {}
        noDataState: Alerting
        execErrState: Alerting
