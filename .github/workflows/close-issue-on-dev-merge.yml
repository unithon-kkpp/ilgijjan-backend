name: close-issue-on-dev-merge

# dev로 머지된 PR 본문의 close/fix/resolve 키워드(#N)를 읽어 해당 이슈를 닫는다.
# GitHub 기본 자동 close는 기본 브랜치(main) 머지에만 동작하므로, dev 머지용으로 보완한다.

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  issues: write

jobs:
  close:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const nums = [...body.matchAll(/(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi)]
              .map(m => Number(m[1]));
            for (const n of [...new Set(nums)]) {
              await github.rest.issues.update({ ...context.repo, issue_number: n, state: 'closed' });
              console.log(`closed #${n}`);
            }
